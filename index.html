<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>凇说</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-theme="light">
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="切换日夜模式">
        <i class="material-icons" id="themeIcon">dark_mode</i>
    </button>

    <audio id="sound-click" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="auto"></audio>
    <audio id="sound-flip" src="https://assets.mixkit.co/active_storage/sfx/3005/3005-preview.mp3" preload="auto"></audio>
    <audio id="sound-magic" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3" preload="auto"></audio>
    <audio id="sound-page" src="https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3" preload="auto"></audio>

    <div class="loader" id="loader"></div>

    <div class="album-container glass-effect" id="albumContainer">
        <div class="album-header">
            <h2 class="album-title">淞の画册</h2>
            <p class="album-subtitle">时间信笺 · 爱于此回响</p>
        </div>
        <div class="date-grid" id="dateGrid"></div>
    </div>

    <div class="container glass-effect" id="messageContainer">
        <button class="back-btn" onclick="backToAlbum()">
            <i class="material-icons">arrow_back</i> 返回画册
        </button>

        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

        <div class="page active" id="page-1">
            <header><h1>能量对应</h1></header>
            <div class="section-title"><i class="material-icons">auto_awesome</i> 对应星座</div>
            <div class="info-grid" id="render-zodiacs"></div> 
            <div class="color-section">
                <div style="font-size: 0.85rem; color: var(--text-muted); letter-spacing: 2px;">感应色彩</div>
                <div class="color-dots" id="render-colors"></div> 
            </div>
            <div class="nav-buttons right"><button class="btn-nav" onclick="changePage(1)">下一步 ➔</button></div>
        </div>

        <div class="page" id="page-2">
            <header><h1>环境感知</h1></header>
            <div class="section-title"><i class="material-icons">psychology</i> 状态对应</div>
            <ul class="status-list" id="render-status"></ul>
            <div class="nav-buttons">
                <button class="btn-nav" onclick="changePage(-1)">⬅ 上一步</button>
                <button class="btn-nav" onclick="changePage(1)">开始读牌 ➔</button>
            </div>
        </div>

        <div class="page" id="page-3">
            <header><h1>信笺展开</h1></header>
            <div class="action-bar">
                <div style="font-size: 0.8rem; color: var(--text-muted);">Ta 想说的话，点击卡牌翻转</div>
                <button class="btn-action" onclick="revealAll('cardsGrid')"><i class="material-icons" style="font-size: 16px;">visibility</i> 一键翻阅</button>
            </div>
            <div class="cards-grid" id="cardsGrid"></div>
            <div class="nav-buttons">
                <button class="btn-nav" onclick="changePage(-1)">⬅ 上一步</button>
                <button class="btn-nav" onclick="changePage(1)">神秘领域 ➔</button>
            </div>
        </div>

        <div class="page" id="page-4">
            <header><h1>隐秘角落</h1></header>
            <div id="passwordArea" class="password-container glass-effect">
                <i class="material-icons" style="font-size: 48px; color: var(--accent-pink);">lock</i>
                <h3>群友特供</h3>
                <p>请输入密钥解锁</p>
                <input type="password" id="secretPwd" class="password-input" placeholder="输入密码" onkeypress="if(event.key === 'Enter') unlockSecret()">
                <button class="btn-action" onclick="unlockSecret()">解 锁</button>
            </div>
            <div id="secretContent" style="display: none;">
                <div class="action-bar">
                    <div style="font-size: 0.8rem; color: var(--accent-pink);">特供传讯已解锁</div>
                    <button class="btn-action" onclick="revealAll('secretCardsGrid')">一键翻阅</button>
                </div>
                <div class="cards-grid" id="secretCardsGrid"></div> 
            </div>
            <div class="nav-buttons">
                <button class="btn-nav" onclick="changePage(-1)">⬅ 上一步</button>
                <button class="btn-nav" onclick="changePage(1)">终点 ➔</button>
            </div>
        </div>

        <div class="page" id="page-5">
            <header><h1>余音绕梁</h1></header>
            <div class="section-title"><i class="material-icons">headphones</i> 推荐音乐</div>
            <div class="music-list" id="render-music"></div>
            <div class="nav-buttons center">
                <button class="btn-nav" onclick="changePage(-4)">↺ 重新回到起点</button>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://img.heliar.top/file/1773755718038_c1788de2c940f973d1e7b45f3d556657.jpeg">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b0b0c">
    <title>传讯 - 淞</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="loader" id="loader"></div>

<div class="album-container" id="albumContainer">
    <div class="album-header">
        <h2 class="album-title">凇-传讯</h2>
        <p class="album-subtitle">大众传讯 · 理性看待</p>
        <div class="album-entry-row">
            <button class="btn-entry-divination" type="button" onclick="openMassDivination()" aria-label="打开大众占卜">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M7 11h10l-2.2-6.2A2 2 0 0 0 12.9 3H11.1a2 2 0 0 0-1.9 1.8L7 11Zm-1 2h12v8a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2v-8Z"></path>
                    <path d="M9.2 14.2h5.6M9.2 17h5.6" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round"></path>
                </svg>
                大众占卜
            </button>
        </div>
    </div>

    <div class="calendar-toolbar">
        <div class="view-toggle" role="tablist" aria-label="主页视图切换">
            <button class="view-btn active" id="viewGridBtn" type="button" aria-pressed="true">列表</button>
            <button class="view-btn" id="viewCalendarBtn" type="button" aria-pressed="false">日历</button>
        </div>
        <div class="toolbar-actions" aria-label="辅助设置">
            <button class="theme-toggle" id="themeToggle" type="button" aria-label="切换日夜模式">
                <svg viewBox="0 0 24 24" class="icon-light"><path d="M12 3a9 9 0 1 0 0 18 9 9 0 0 0 0-18zm0 16a7 7 0 1 1 0-14 7 7 0 0 1 0 14z"></path><path d="M12 5v2m0 10v2m4.24-8.24 1.42 1.42M5.34 5.34l1.42 1.42m11.32 0 1.42-1.42M5.34 18.66l1.42-1.42M17 12h2M5 12h2"></path></svg>
                <svg viewBox="0 0 24 24" class="icon-dark"><path d="M12 2a10 10 0 1 0 10 10H12V2z"></path></svg>
            </button>
        </div>
    </div>

    <div class="date-grid" id="dateGrid"></div>
    <div class="calendar-view" id="calendarView" style="display:none;"></div>
</div>

<div class="container" id="messageContainer">
    <button class="back-btn" type="button" onclick="backToAlbum()" aria-label="返回首页">
        <svg viewBox="0 0 24 24"><path d="M19 11H7.83l4.59-4.59L11 5l-7 7 7 7 1.41-1.41L7.83 13H19v-2z"></path></svg>
    </button>

    <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="page active" id="page-1">
        <header><h1>大众传讯</h1><p class="page-note">传讯每日一更，占卜每周一更</p></header>
        <div class="section-title">
            <svg viewBox="0 0 24 24"><path d="M12 2L2 22h20L12 2zm0 3.8L18.4 19H5.6L12 5.8z"></path></svg>
            信息对应
        </div>
        <div class="info-grid" id="zodiacGrid"></div>
        <div class="nav-buttons right">
            <button class="btn-nav" onclick="changePage(1)">
                下一步
                <svg viewBox="0 0 24 24"><path d="M5 11h11.17l-4.59 4.59L13 17l7-7-7-7-1.41 1.41L16.17 11H5v2z"></path></svg>
            </button>
        </div>
    </div>

    <div class="page" id="page-2">
        <header><h1>环境感知</h1></header>
        <div class="section-title">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"></path></svg>
            状态对应
        </div>
        <ul class="status-list" id="statusList"></ul>
        <div class="nav-buttons">
            <button class="btn-nav" onclick="changePage(-1)">
                <svg viewBox="0 0 24 24"><path d="M19 11H7.83l4.59-4.59L11 5l-7 7 7 7 1.41-1.41L7.83 13H19v-2z"></path></svg>
                上一步
            </button>
            <button class="btn-nav" onclick="changePage(1)">
                开始读牌
                <svg viewBox="0 0 24 24"><path d="M5 11h11.17l-4.59 4.59L13 17l7-7-7-7-1.41 1.41L16.17 11H5v2z"></path></svg>
            </button>
        </div>
    </div>

    <div class="page" id="page-3">
        <header><h1>信笺与低语</h1></header>
        <div class="action-bar">
            <div>Ta 想说的话，点击翻转</div>
            <button class="btn-action" onclick="revealAll('cardsGrid')" aria-label="全部翻阅">
                <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"></path></svg>
            </button>
        </div>
        <div class="cards-grid" id="cardsGrid"></div>
        <div class="nav-buttons">
            <button class="btn-nav" onclick="changePage(-1)">
                <svg viewBox="0 0 24 24"><path d="M19 11H7.83l4.59-4.59L11 5l-7 7 7 7 1.41-1.41L7.83 13H19v-2z"></path></svg>
                上一步
            </button>
            <button class="btn-nav" onclick="changePage(1)">
                神秘领域
                <svg viewBox="0 0 24 24"><path d="M5 11h11.17l-4.59 4.59L13 17l7-7-7-7-1.41 1.41L16.17 11H5v2z"></path></svg>
            </button>
        </div>
    </div>

    <div class="page" id="page-4">
        <header><h1>隐秘角落</h1></header>
        <div id="passwordArea" class="password-container">
            <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"></path></svg>
            <h3>有缘人特供</h3>
            <p>请输入密钥解锁</p>
            <input type="password" id="secretPwd" class="password-input" placeholder="输入密码" onkeypress="if(event.key === 'Enter') unlockSecret()">
            <button class="btn-action" onclick="unlockSecret()">解 锁</button>
        </div>
        <div id="secretContent" style="display: none;">
            <div class="action-bar">
                <div>特供传讯已解锁</div>
                <button class="btn-action" onclick="revealAll('secretCardsGrid')" aria-label="全部翻阅">
                    <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"></path></svg>
                </button>
            </div>
            <div class="cards-grid" id="secretCardsGrid"></div>
        </div>
        <div class="nav-buttons">
            <button class="btn-nav" onclick="changePage(-1)">
                <svg viewBox="0 0 24 24"><path d="M19 11H7.83l4.59-4.59L11 5l-7 7 7 7 1.41-1.41L7.83 13H19v-2z"></path></svg>
                上一步
            </button>
            <button class="btn-nav" onclick="changePage(1)">
                终点
                <svg viewBox="0 0 24 24"><path d="M5 11h11.17l-4.59 4.59L13 17l7-7-7-7-1.41 1.41L16.17 11H5v2z"></path></svg>
            </button>
        </div>
    </div>

    <div class="page" id="page-5">
        <header><h1>余音绕梁</h1></header>
        <div class="section-title">
            <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"></path></svg>
            推荐音乐
        </div>
        <div class="music-list" id="musicList"></div>
        <div class="nav-buttons center">
            <button class="btn-nav" type="button" onclick="changePage(-4)" aria-label="回到起点">
                <svg viewBox="0 0 24 24"><path d="M13 3c-4.97 0-9 4.03-9 9H1l4 4 4-4H5c0-3.86 3.14-7 7-7s7 3.14 7 7-3.14 7-7 7c-1.93 0-3.68-.78-4.94-2.06l-1.42 1.42C8.27 20.99 10.51 22 13 22c4.97 0 9-4.03 9-9s-4.03-9-9-9z"></path></svg>
            </button>
        </div>
    </div>

    <div class="page" id="page-6">
        <header><h1>大众占卜</h1><p class="page-note">传讯每日一更，占卜每周一更</p></header>
        <div class="section-title tri-section-title">
            <svg viewBox="0 0 24 24"><path d="M12 2a7 7 0 0 0-7 7c0 2.2 1 4.2 2.6 5.6L6 22l6-3 6 3-1.6-7.4A7 7 0 0 0 19 9a7 7 0 0 0-7-7Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"></path></svg>
            <span id="triQuestionText">假设你们是神奇动物和饲养员，关系如何？</span>
        </div>

        <div class="tri-options-grid" id="triOptionsGrid">
            <button class="tri-option-btn" type="button" data-tri-option="1" onclick="selectMassDivinationOption(1)" aria-label="选择选项一">
                <div class="tri-option-media">
                    <img alt="选项一图片" src="https://img.heliar.top/file/1774003647616_IMG_2829.jpeg">
                </div>
                <div class="tri-option-overlay">
                    <span class="tri-option-number">选项一</span>
                </div>
            </button>

            <button class="tri-option-btn" type="button" data-tri-option="2" onclick="selectMassDivinationOption(2)" aria-label="选择选项二">
                <div class="tri-option-media">
                    <img alt="选项二图片" src="https://img.heliar.top/file/1774007991620_IMG_2830.jpeg">
                </div>
                <div class="tri-option-overlay">
                    <span class="tri-option-number">选项二</span>
                </div>
            </button>

            <button class="tri-option-btn" type="button" data-tri-option="3" onclick="selectMassDivinationOption(3)" aria-label="选择选项三">
                <div class="tri-option-media">
                    <img alt="选项三图片" src="https://img.heliar.top/file/1774007992941_IMG_2831.jpeg">
                </div>
                <div class="tri-option-overlay">
                    <span class="tri-option-number">选项三</span>
                </div>
            </button>
        </div>

        <div class="nav-buttons">
            <button class="btn-nav" type="button" onclick="backToAlbum()">
                <svg viewBox="0 0 24 24"><path d="M19 11H7.83l4.59-4.59L11 5l-7 7 7 7 1.41-1.41L7.83 13H19v-2z"></path></svg>
                返回首页
            </button>
        </div>
    </div>

    <div class="page" id="page-7">
        <header><h1>占卜结果</h1></header>

        <div class="tri-result-top" id="triResultTop">
            <div class="tri-result-media">
                <img id="triResultImg" alt="占卜结果图片">
            </div>
            <div class="tri-result-side">
                <div class="tri-result-kicker" id="triResultKicker">选项一</div>
            </div>
        </div>

        <div class="tri-result-text" id="triResultText"></div>

        <div class="nav-buttons">
            <button class="btn-nav" type="button" onclick="changePage(-1)" aria-label="返回选项">
                <svg viewBox="0 0 24 24"><path d="M19 11H7.83l4.59-4.59L11 5l-7 7 7 7 1.41-1.41L7.83 13H19v-2z"></path></svg>
                返回选项
            </button>
            <button class="btn-nav" type="button" onclick="backToAlbum()" aria-label="返回首页">
                <svg viewBox="0 0 24 24"><path d="M19 11H7.83l4.59-4.59L11 5l-7 7 7 7 1.41-1.41L7.83 13H19v-2z"></path></svg>
                返回首页
            </button>
        </div>
    </div>
</div>

<div id="toast"></div>

<script src="js/data.js"></script>
<script src="js/main.js"></script>
</body>
</html>
